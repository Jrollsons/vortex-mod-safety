<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; overflow: hidden; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(ellipse 900px 620px at 42% 46%, #24333f 0%, #131a20 58%, #0b0f12 100%);
    position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 760px 520px at 45% 48%, black 25%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 760px 520px at 45% 48%, black 25%, transparent 75%);
  }

  /* stylized mod list card */
  .card {
    position: absolute; left: 120px; top: 108px;
    width: 730px; height: 504px;
    background: linear-gradient(180deg, #1d262e 0%, #171f26 100%);
    border: 2px solid rgba(255,255,255,0.07);
    border-radius: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    padding: 30px 34px;
    display: flex; flex-direction: column; gap: 22px;
  }
  .row {
    flex: 1;
    display: flex; align-items: center; gap: 26px;
    background: rgba(255,255,255,0.030);
    border: 2px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 0 28px;
  }
  .row.bad {
    background: rgba(255,90,90,0.10);
    border-color: rgba(255,107,107,0.65);
    box-shadow: 0 0 34px rgba(255,80,80,0.28), inset 0 0 22px rgba(255,80,80,0.07);
  }
  /* fake text bars */
  .bars { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
  .bar  { height: 16px; border-radius: 8px; background: rgba(255,255,255,0.16); }
  .bar.b2 { width: 42%; background: rgba(255,255,255,0.08); }
  .row:nth-child(1) .bar.b1 { width: 62%; }
  .row:nth-child(2) .bar.b1 { width: 74%; }
  .row:nth-child(3) .bar.b1 { width: 55%; }
  .row.bad .bar { background: rgba(255,150,150,0.30); }
  .row.bad .bar.b2 { background: rgba(255,150,150,0.16); }
  .row:nth-child(4) .bar.b1 { width: 68%; }
  .row:nth-child(5) .bar.b1 { width: 48%; }

  .status { flex-shrink: 0; width: 56px; height: 56px; }

  /* big shield overlapping the card */
  .shield-wrap { position: absolute; right: 96px; top: 130px; }
  .shield-glow {
    position: absolute; left: 50%; top: 50%;
    width: 640px; height: 640px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(87,197,153,0.28) 0%, transparent 62%);
  }
</style>
</head>
<body>
  <div class="grid"></div>

  <div class="card">
    <div class="row">
      <svg class="status" viewBox="0 0 56 56"><circle cx="28" cy="28" r="25" fill="rgba(87,197,153,0.14)" stroke="#57c599" stroke-width="4"/><path d="M17 29 L25 37 L40 20" stroke="#57c599" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="bars"><div class="bar b1"></div><div class="bar b2"></div></div>
    </div>
    <div class="row">
      <svg class="status" viewBox="0 0 56 56"><circle cx="28" cy="28" r="25" fill="rgba(87,197,153,0.14)" stroke="#57c599" stroke-width="4"/><path d="M17 29 L25 37 L40 20" stroke="#57c599" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="bars"><div class="bar b1"></div><div class="bar b2"></div></div>
    </div>
    <div class="row bad">
      <svg class="status" viewBox="0 0 56 56"><path d="M28 4 L50 12 V29 C50 42 41 51 28 55 C15 51 6 42 6 29 V12 Z" fill="rgba(255,107,107,0.18)" stroke="#ff6b6b" stroke-width="4" stroke-linejoin="round"/><line x1="28" y1="17" x2="28" y2="33" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round"/><circle cx="28" cy="43" r="4" fill="#ff6b6b"/></svg>
      <div class="bars"><div class="bar b1"></div><div class="bar b2"></div></div>
    </div>
    <div class="row">
      <svg class="status" viewBox="0 0 56 56"><circle cx="28" cy="28" r="25" fill="rgba(87,197,153,0.14)" stroke="#57c599" stroke-width="4"/><path d="M17 29 L25 37 L40 20" stroke="#57c599" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="bars"><div class="bar b1"></div><div class="bar b2"></div></div>
    </div>
    <div class="row">
      <svg class="status" viewBox="0 0 56 56"><circle cx="28" cy="28" r="25" fill="rgba(255,180,84,0.12)" stroke="#ffb454" stroke-width="4"/><line x1="28" y1="15" x2="28" y2="32" stroke="#ffb454" stroke-width="6" stroke-linecap="round"/><circle cx="28" cy="42" r="4" fill="#ffb454"/></svg>
      <div class="bars"><div class="bar b1"></div><div class="bar b2"></div></div>
    </div>
  </div>

  <div class="shield-wrap">
    <div class="shield-glow"></div>
    <svg width="420" height="472" viewBox="0 0 480 540" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="480" y2="540">
          <stop offset="0%" stop-color="#334a57"/>
          <stop offset="100%" stop-color="#1a262e"/>
        </linearGradient>
        <linearGradient id="edge" x1="0" y1="0" x2="480" y2="540">
          <stop offset="0%" stop-color="#63d4a6"/>
          <stop offset="100%" stop-color="#2b8f66"/>
        </linearGradient>
        <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
        </filter>
      </defs>
      <g filter="url(#ds)">
        <path d="M240 20 L440 92 V268 C440 396 356 478 240 522 C124 478 40 396 40 268 V92 Z"
              fill="url(#sg)" stroke="url(#edge)" stroke-width="12"/>
        <path d="M240 60 L404 119 V266 C404 372 336 442 240 482 C144 442 76 372 76 266 V119 Z"
              fill="none" stroke="rgba(87,197,153,0.28)" stroke-width="3"/>
        <path d="M150 272 L215 337 L338 196" stroke="#57c599" stroke-width="38"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
    </svg>
  </div>
</body>
</html>
