<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(ellipse 1400px 900px at 30% 45%, #22303c 0%, #12181d 55%, #0b0f12 100%);
    color: #eef2f5;
    position: relative;
  }
  /* faint hex grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 72px 72px;
    mask-image: radial-gradient(ellipse 1200px 800px at 35% 45%, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 1200px 800px at 35% 45%, black 30%, transparent 75%);
  }
  .wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    padding: 0 120px;
    gap: 100px;
  }
  .shield-col { flex-shrink: 0; position: relative; }
  .shield-glow {
    position: absolute; left: 50%; top: 50%;
    width: 560px; height: 560px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(87,197,153,0.22) 0%, transparent 65%);
  }
  .text-col { flex-grow: 1; }
  .kicker {
    font-size: 30px; letter-spacing: 10px; text-transform: uppercase;
    color: #57c599; font-weight: 600; margin-bottom: 18px;
  }
  h1 {
    font-size: 128px; font-weight: 800; letter-spacing: -2px;
    line-height: 1.02; margin-bottom: 30px;
  }
  .tag {
    font-size: 44px; font-weight: 300; color: #c3ced6;
    line-height: 1.35; margin-bottom: 56px; max-width: 980px;
  }
  .tag b { color: #eef2f5; font-weight: 600; }
  .chips { display: flex; gap: 26px; margin-bottom: 64px; }
  .chip {
    font-size: 30px; font-weight: 700; letter-spacing: 1px;
    padding: 16px 36px; border-radius: 999px;
    border: 2px solid; display: flex; align-items: center; gap: 14px;
  }
  .chip::before { content: ""; width: 16px; height: 16px; border-radius: 50%; background: currentColor; }
  .clean   { color: #57c599; border-color: rgba(87,197,153,0.55);  background: rgba(87,197,153,0.10); }
  .flagged { color: #ff6b6b; border-color: rgba(255,107,107,0.55); background: rgba(255,107,107,0.10); }
  .caution { color: #ffb454; border-color: rgba(255,180,84,0.55);  background: rgba(255,180,84,0.10); }
  .unknown { color: #9fb0bc; border-color: rgba(159,176,188,0.45); background: rgba(159,176,188,0.08); }
  .footer {
    font-size: 30px; color: #8b9aa5; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 20px;
  }
  .footer .dot { width: 8px; height: 8px; border-radius: 50%; background: #46545f; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="wrap">
    <div class="shield-col">
      <div class="shield-glow"></div>
      <svg width="480" height="540" viewBox="0 0 480 540" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="480" y2="540">
            <stop offset="0%" stop-color="#2f4450"/>
            <stop offset="100%" stop-color="#1a262e"/>
          </linearGradient>
          <linearGradient id="edge" x1="0" y1="0" x2="480" y2="540">
            <stop offset="0%" stop-color="#57c599"/>
            <stop offset="100%" stop-color="#2b8f66"/>
          </linearGradient>
        </defs>
        <path d="M240 20 L440 92 V268 C440 396 356 478 240 522 C124 478 40 396 40 268 V92 Z"
              fill="url(#sg)" stroke="url(#edge)" stroke-width="10"/>
        <path d="M240 60 L404 119 V266 C404 372 336 442 240 482 C144 442 76 372 76 266 V119 Z"
              fill="none" stroke="rgba(87,197,153,0.25)" stroke-width="3"/>
        <path d="M150 272 L215 337 L338 196" stroke="#57c599" stroke-width="34"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="text-col">
      <div class="kicker">Vortex Extension</div>
      <h1>Mod Safety</h1>
      <div class="tag">Is that mod still on Nexus Mods? If a file was <b>removed from the site</b>, you'll know — <b>before you deploy it</b> into your game.</div>
      <div class="chips">
        <div class="chip clean">CLEAN</div>
        <div class="chip flagged">FLAGGED</div>
        <div class="chip caution">CAUTION</div>
        <div class="chip unknown">UNKNOWN</div>
      </div>
      <div class="footer">
        <span>Scans on every launch</span><span class="dot"></span>
        <span>Safety column on your mod list</span><span class="dot"></span>
        <span>No API key needed</span>
      </div>
    </div>
  </div>
</body>
</html>
